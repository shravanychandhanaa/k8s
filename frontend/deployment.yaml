apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: crtd
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 400013494799.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest
          ports:
            - containerPort: 8080
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: API_BASE_URL
            - name: PAYMENTS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: PAYMENTS_BASE_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: GOOGLE_CLIENT_ID
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      imagePullSecrets:
        - name: ecr-secret