apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: crtd
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 400013494799.dkr.ecr.ap-south-1.amazonaws.com/backend:e24a494
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
      imagePullSecrets:
        - name: ecr-secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: crtd
  labels:
    app: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: 400013494799.dkr.ecr.ap-south-1.amazonaws.com/backend:e24a494
          command: ["celery", "-A", "crtd", "worker", "-l", "info"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      imagePullSecrets:
        - name: ecr-secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: crtd
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: 400013494799.dkr.ecr.ap-south-1.amazonaws.com/backend:e24a494
          command: ["celery", "-A", "crtd", "beat", "-l", "info"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      imagePullSecrets:
        - name: ecr-secret